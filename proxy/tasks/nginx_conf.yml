---
- name: Create nginx directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/nginx/snippets
    - /var/log/nginx
  
- name: Deploy nginx configuration
  ansible.builtin.template:
    src: ./proxy/templates/nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: '0644'
  notify: restart nginx

- name: Deploy security headers configuration
  ansible.builtin.copy:
    src: ./proxy/files/security_headers.conf
    dest: /etc/nginx/snippets/security-headers.conf
    mode: '0644'
  notify: restart nginx

- name: Deploy SSL configuration
  ansible.builtin.copy:
    src: ./proxy/files/ssl_params.conf
    dest: /etc/nginx/snippets/ssl-params.conf
    mode: '0644'
  notify: restart nginx