---
- name: OG Pi Setup
  hosts: og_pi
  become: true
  handlers:
    - ansible.builtin.import_tasks: og_pi/handlers/main.yml
    - ansible.builtin.import_tasks: shared/handlers/main.yml
  vars_files:
    - ./group_vars/og_pi/vault.yml
  tasks: 
    - name: Update all packages
      ansible.builtin.apt:
        name: "*"
        state: latest
        update_cache: true

    - name: Install basic tools
      ansible.builtin.apt:
        name:
          - rtl-433
          - git
          - supervisor
          - python3-pip
          - python3-venv
          - mosquitto
          - mosquitto-clients # required for testing mqtt connection
        state: present
    
    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"
    
    - name: Configure SSH security
      ansible.builtin.import_tasks: shared/tasks/ssh.yml

    - name: Set 644 for the authorized_keys file
      ansible.builtin.file:
        path: "/home/{{ username }}/.ssh/authorized_keys"
        mode: '0644'
    
    - name: Create blacklist file for rtl_433
      ansible.builtin.copy:
        src: ./og_pi/files/blacklist-rtl-sdr.conf
        dest: /etc/modprobe.d/blacklist-rtl-sdr.conf
        mode: '0644'
        owner: root
        group: root

    - name: Start mosquitto
      ansible.builtin.service:
        name: mosquitto
        state: started
        enabled: true

    - name: Set udev rules
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/10-rtl-sdr.rules
        content: 'SUBSYSTEMS=="usb", ATTRS{idVendor}=="0bda", ATTRS{idProduct}=="2838", MODE:="0666"'
        mode: '0644'
      notify: 
        - reload udev rules
        - trigger udev rules
    
    - name: Create startup directory
      ansible.builtin.file:
        path: "/home/{{ username }}/startup"
        state: directory
        mode: '0755'
        owner: "{{ username }}"

    - name: Create home automation directory
      ansible.builtin.file:
        path: "/home/{{ username }}/HomeAutomation"
        state: directory
        mode: '0755'
        owner: "{{ username }}"

    - name: Deploy Home Automation app
      ansible.builtin.import_tasks: og_pi/tasks/deploy_homeautomation.yml
      vars:
        destination: /home/{{ username }}/HomeAutomation
      notify: restart mqtt supervisor program
      tags: [app_deployment]

    - name: Save the shell scripts for supervisor
      ansible.builtin.template:
        src: "./og_pi/templates/{{ item.src }}"
        dest: "/home/{{ username }}/startup/{{ item.dest }}"
        mode: '0755'
        owner: "{{ username }}"
      loop:
        - { src: "mqtt.sh.j2", dest: "mqtt.sh" } # yamllint disable-line rule:quoted-strings
        - { src: "rtl.sh.j2", dest: "rtl433.sh" } # yamllint disable-line rule:quoted-strings

    - name: Update the supervisor with mqtt and rtl
      ansible.builtin.template:
        src: "./og_pi/templates/{{ item.src }}"
        dest: "/etc/supervisor/conf.d/{{ item.dest }}"
        mode: '0644'
      loop:
        - { src: "mqtt.conf.j2", dest: "mqtt.conf" } # yamllint disable-line rule:quoted-strings
        - { src: "rtl.conf.j2", dest: "rtl.conf" } # yamllint disable-line rule:quoted-strings

    - name: Load supervisor configs
      community.general.supervisorctl:
        name: "{{ item }}"
        state: started
      loop:
        - mqtt
        - rtl_433
    