---
- name: Setup cockpit
  ansible.builtin.dnf:
    name: cockpit
    state: present

- name: Start cockpit
  ansible.builtin.service:
    name: cockpit.socket
    state: started
    enabled: true

- name: Open cockpit port in firewall
  ansible.builtin.firewalld:
    service: cockpit
    permanent: true
    state: enabled
    immediate: true
  notify: Restart firewalld

- name: Verify cockpit is running
  ansible.builtin.uri:
    url: http://localhost:9090
    status_code: 200

- name: Add machines addon for cockpit
  ansible.builtin.dnf:
    name: cockpit-machines
    state: present