---
- name: Setup Grafana
  hosts: tunnel_hosts
  become: true
  vars_files:
    - group_vars/tunnel_hosts/vault.yml
  tasks:
    - name: Install requests for HTTP requests
      ansible.builtin.pip:
        name: requests
        executable: pip3
        state: present

    - name: Ensure Grafana provisioning directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: "{{ deploy_user_name }}"
        group: "{{ deploy_user_name }}"
      loop:
        - "/home/{{ deploy_user_name }}/docker/config/grafana/provisioning"
        - "/home/{{ deploy_user_name }}/docker/config/grafana/provisioning/dashboards"
        - "/home/{{ deploy_user_name }}/docker/config/grafana/dashboards"

    - name: Deploy Grafana dashboard provider
      ansible.builtin.template:
        src: vps-tunnel/templates/grafana_dashboards_provider.yml.j2
        dest: "/home/{{ deploy_user_name }}/docker/config/grafana/provisioning/dashboards/ansible.yml"
        mode: '0644'
        owner: "{{ deploy_user_name }}"
        group: "{{ deploy_user_name }}"
      notify: restart grafana

    - name: Copy provisioned Grafana dashboards
      ansible.builtin.copy:
        src: vps-tunnel/grafana_dashboards/
        dest: "/home/{{ deploy_user_name }}/docker/config/grafana/dashboards/"
        mode: '0644'
        owner: "{{ deploy_user_name }}"
        group: "{{ deploy_user_name }}"
      notify: restart grafana

    - name: Create Grafana datasource for prometheus
      grafana.grafana.datasource:
        grafana_url: '{{ grafana_url }}'
        grafana_api_key: '{{ grafana_api_key }}'
        state: present
        dataSource:
          name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          uid: prometheus

    - name: Create Grafana datasource for Loki
      grafana.grafana.datasource:
        grafana_url: '{{ grafana_url }}'
        grafana_api_key: '{{ grafana_api_key }}'
        state: present
        dataSource:
          name: Loki
          type: loki
          access: proxy
          url: http://loki:3100
          uid: loki
  handlers:
    - name: restart grafana
      community.docker.docker_compose_v2:
        project_src: "/home/{{ deploy_user_name }}/docker"
        files:
          - docker-compose-grafana.yml
        services:
          - grafana
        state: restarted