---
- name: Container manager
  hosts: container_manager
  become: true
  vars_files:
    - group_vars/portainer_managers/vars.yml
    - group_vars/portainer_managers/vault.yml
  handlers:
    - ansible.builtin.import_tasks: container-manager/handlers/main.yml
    - ansible.builtin.import_tasks: shared/handlers/main.yml
  tasks:
      - name: Update all packages
        ansible.builtin.dnf:
          name: "*"
          state: latest
          update_cache: true
          allowerasing: true
          disablerepo:
            - cuda-rhel10-x86_64
            - nvidia-container-toolkit

      - name: Set timezone
        community.general.timezone:
          name: "{{ timezone }}"

      - name: Install Docker
        ansible.builtin.import_tasks: shared/tasks/docker.yml
        vars:
          deploy_user_name: "{{ username }}"

      - name: Install NVIDIA GPU container support
        ansible.builtin.import_tasks: container-manager/tasks/nvidia_gpu.yml
        when: container_manager_nvidia_enabled | default(false)

      - name: Reboot container manager if NVIDIA driver changes require it
        ansible.builtin.reboot:
          msg: Reboot initiated by Ansible after NVIDIA driver/runtime changes
        when: container_manager_nvidia_reboot_required | default(false)

      - name: Setup portainer
        ansible.builtin.import_tasks: container-manager/tasks/portainer_setup.yml

      - name: Setup cockpit
        ansible.builtin.import_tasks: shared/tasks/setup_cockpit.yml

- import_playbook: container-manager/playbooks/portainer-stacks.yml

- import_playbook: container-manager/playbooks/pangolin-blueprint-deploy.yml