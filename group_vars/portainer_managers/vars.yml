timezone: America/Detroit

domain: mclaysen.com
email_address: me@mclaysen.com
username: ansible
node_exporter_version: 1.10.2
cadvisor_listen_ip: 172.17.0.1
cadvisor_port: 8080
cadvisor_version: 0.55.1

# System configuration
fileshare_group_name: fileshare_users
fileshare_group_gid: 3004
home_videos_nfs_share: 192.168.86.200:/mnt/philbert/media/home_videos
home_videos_mount_point: /mnt/truenas_shares/home

# Pangolin installer configuration
reverse_proxy_ip: 192.168.86.168

unifi_url: https://192.168.86.1

docker_metrics_addr: 0.0.0.0:9323
container_manager_nvidia_enabled: true
container_manager_nvidia_cuda_repo_baseurl: https://developer.download.nvidia.com/compute/cuda/repos/rhel10/x86_64/
container_manager_nvidia_container_repo_baseurl: https://nvidia.github.io/libnvidia-container/stable/rpm/$basearch
container_manager_nvidia_repo_packages:
  - epel-release
container_manager_nvidia_prerequisite_packages:
  - dkms
  - kernel-devel
  - kernel-headers
  - gcc
  - make
container_manager_nvidia_driver_branch: "580"
container_manager_nvidia_driver_packages:
  - "cuda-drivers-{{ container_manager_nvidia_driver_branch }}"
container_manager_nvidia_container_packages:
  - nvidia-container-toolkit

# Portainer configuration
portainer_image: portainer/portainer-ce
portainer_tag: 2.41.1
portainer_container_name: portainer
portainer_data_dir: /opt/portainer/data
portainer_https_port: 9443
portainer_agent_port: 9001
portainer_http_port: 9000
endpoint_id: 3
portainer_manager_endpoint: http://192.168.86.202:9000 #https://container-manager.mclaysen.com

#Cloudflared configuration
cloudflared_version: 2026.5.0

# Newt configuration
newt_version: 1.13.0
blueprint_file_path: /home/{{ username }}/docker/newt/config/home1_pangolin_blueprint.yml

#Jellyfin
jellyfin_version: 10.11.8

#smarthome stack
homebridge_version: '2026-06-24'
homebridge_config_dir: /home/{{ username }}/docker/smarthome/homebridge

#monitoring stack
prometheus_version: v3.9.1
prometheus_host_port: 9091
prometheus_config_path: /home/{{ username }}/docker/monitoring/prometheus/prometheus.yml

sudoers_file_path: /etc/sudoers

security_ssh_config_path: /etc/ssh/sshd_config
security_sshd_name: sshd

security_ssh_port: 22
security_ssh_password_authentication: "no"
security_ssh_permit_root_login: "no"
security_ssh_usedns: "no"
security_ssh_permit_empty_password: "no"
security_ssh_challenge_response_auth: "no"
security_ssh_gss_api_authentication: "no"
security_ssh_x11_forwarding: "no"
security_sshd_state: started
security_ssh_restart_handler_state: restarted
security_ssh_allowed_users: 
  - "{{ username }}"
security_ssh_allowed_groups: []

security_sudoers_passwordless:
  - "{{ username }}"
security_sudoers_passworded: []

security_autoupdate_enabled: true
security_autoupdate_blacklist: []
security_autoupdate_additional_origins: []
