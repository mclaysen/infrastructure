---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: yes

- name: restart ssh
  ansible.builtin.service:
    name: "{{ security_sshd_name }}"
    state: "{{ security_ssh_restart_handler_state }}"

- name: restart firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: restarted
    enabled: true

- name: restart docker
  ansible.builtin.service:
    name: docker
    state: restarted

- name: restart traefik
  community.docker.docker_compose_v2:
    project_src: "/home/{{ deploy_user_name }}/docker"
    files:
      - docker-compose.yml
    services:
      - traefik
    state: restarted