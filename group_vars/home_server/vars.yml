deploy_user_name: ansible
user_name: "{{ deploy_user_name }}"
deployuser_ssh_public_key_path: ~/.ssh/home-server.pub

timezone: America/Detroit

libvirt_storage_pools:
  - name: fast
    path: /var/lib/libvirt/images-fast
  - name: bulk
    path: /var/lib/libvirt/images-bulk

# General vm configs
vm_images_cache_dir: /var/cache/libvirt/images
vm_pool_name_fast: fast
vm_pool_name_bulk: bulk
vm_network_bridge_name: vm-bridge

# Home assistant vm configs
home_assistant_vm_name: home-assistant-prod
home_assistant_base_image: https://github.com/home-assistant/operating-system/releases/download/17.3/haos_ova-17.3.qcow2.xz
home_assistant_base_image_checksum: sha256:d42fadf806c0690792a4460ff3a72c2846c4e16e2033aefad0835662e7a9696f
home_assistant_disk_path: /var/lib/libvirt/images-fast/home-assistant.qcow2
home_assistant_memory_mb: 4096
home_assistant_vcpus: 2
home_assistant_machine_type: pc-q35-rhel10.0.0
home_assistant_network_model: virtio
home_assistant_mac_address: 02:42:AC:1C:6B:0A
usb_devices:
  - bus: 1
    device: 4 #zwave adapter
  - bus: 1
    device: 6 #zwave adapter
  - bus: 1
    device: 2 #bluetooth adapter

# Reverse proxy vm configs
reverse_proxy_vm_name: proxy-prod
reverse_proxy_host_name: reverse-proxy-prod
reverse_proxy_base_image: https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.img
reverse_proxy_seed_img_name: "{{ reverse_proxy_base_image | basename }}"
reverse_proxy_base_image_checksum: sha256:53fdde898feed8b027d94baa9cfe8229867f330a1d9c49dc7d84465ee7f229f7
reverse_proxy_disk_path: /var/lib/libvirt/images-bulk/reverse-proxy.qcow2
reverse_proxy_memory_mb: 2048
reverse_proxy_vcpus: 1
reverse_proxy_machine_type: pc-q35-rhel10.0.0
reverse_proxy_network_model: virtio
reverse_proxy_mac_address: 52:54:00:7B:21:9E
reverse_proxy_seed_img_path: /var/lib/libvirt/images-bulk/reverse_proxy_seed.img
reverse_proxy_seed_user_name: "user-data-{{reverse_proxy_vm_name}}"
reverse_proxy_seed_meta_name: "meta-data-{{reverse_proxy_vm_name}}"
reverse_proxy_disk_size_gb: 40


#Container manager vm configs
container_manager_vm_name: container-manager-prod
container_manager_host_name: container-manager-prod
container_manager_base_image: https://repo.almalinux.org/almalinux/10/cloud/x86_64_v2/images/AlmaLinux-10-GenericCloud-10.1-20260518.0.x86_64_v2.qcow2
container_manager_seed_img_name: "{{ container_manager_base_image | basename }}"
container_manager_base_image_checksum: sha256:939e1feb58edcbed983e5ab025d62e37fb2664153d405c09499217c857f2ce06
container_manager_disk_path: /var/lib/libvirt/images-bulk/container-manager.qcow2
container_manager_memory_mb: 16384
container_manager_vcpus: 4
container_manager_machine_type: pc-q35-rhel10.0.0
container_manager_network_model: virtio
container_manager_mac_address: 52:54:00:7B:21:9F
container_manager_seed_img_path: /var/lib/libvirt/images-bulk/container_manager_seed.img
container_manager_seed_user_name: "user-data-{{container_manager_vm_name}}"
container_manager_seed_meta_name: "meta-data-{{container_manager_vm_name}}"
container_manager_disk_size_gb: 300
container_manager_gpu_ids:
  - 10de:1d01
  - 10de:0fb8
container_manager_pci_devices:
  - domain: "0x0000"
    bus: "0x01"
    slot: "0x00"
    function: "0x0" #nvidia gpu
  - domain: "0x0000"
    bus: "0x01"
    slot: "0x00"
    function: "0x1" #nvidia hdmi audio

# Bridge network configuration
bridge_network_name: br0
ethernet_ifname: enp5s0
bridge_interface_name: "br0-slave-{{ ethernet_ifname }}"
bridge_stp_enabled: false
bridge_ipv4_method: disabled
bridge_ipv6_method: disabled


#monitoring configs
cadvisor_listen_ip: 172.17.0.1
cadvisor_port: 8080
cadvisor_version: 0.55.1
node_exporter_version: 1.10.2

sudoers_file_path: /etc/sudoers.d/ansible-file

security_ssh_config_path: /etc/ssh/sshd_config
security_sshd_name: sshd

security_ssh_port: 22
security_ssh_password_authentication: "no"
security_ssh_permit_root_login: "no"
security_ssh_usedns: "no"
security_ssh_permit_empty_password: "no"
security_ssh_challenge_response_auth: "no"
security_ssh_gss_api_authentication: "no"
security_ssh_x11_forwarding: "yes"
security_sshd_state: started
security_ssh_restart_handler_state: restarted
security_ssh_allowed_users: 
  - "{{ user_name }}"
security_ssh_allowed_groups: []

security_sudoers_passwordless:
  - "{{ user_name }}"
security_sudoers_passworded: []

security_autoupdate_enabled: true
security_autoupdate_blacklist: []
security_autoupdate_additional_origins: []