---
- name: Ensure RPM GPG key directory exists
  ansible.builtin.file:
    path: /etc/pki/rpm-gpg
    state: directory
    mode: '0755'

- name: Copy NVIDIA CUDA GPG key
  ansible.builtin.copy:
    content: "{{ lookup('file', playbook_dir ~ '/container-manager/files/nvidia-cuda-key.pub') }}"
    dest: /etc/pki/rpm-gpg/nvidia-cuda-key.pub
    mode: '0644'

- name: Import NVIDIA CUDA GPG key
  ansible.builtin.rpm_key:
    state: present
    key: /etc/pki/rpm-gpg/nvidia-cuda-key.pub

- name: Configure NVIDIA CUDA repository
  ansible.builtin.yum_repository:
    name: cuda-rhel10-x86_64
    description: NVIDIA CUDA Repository
    file: cuda-rhel10
    baseurl: "{{ container_manager_nvidia_cuda_repo_baseurl }}"
    enabled: true
    gpgcheck: true
    gpgkey: file:///etc/pki/rpm-gpg/nvidia-cuda-key.pub

- name: Copy NVIDIA container toolkit GPG key
  ansible.builtin.copy:
    content: "{{ lookup('file', playbook_dir ~ '/container-manager/files/nvidia-container-toolkit-key.pub') }}"
    dest: /etc/pki/rpm-gpg/nvidia-container-toolkit-key.pub
    mode: '0644'

- name: Import NVIDIA container toolkit GPG key
  ansible.builtin.rpm_key:
    state: present
    key: /etc/pki/rpm-gpg/nvidia-container-toolkit-key.pub

- name: Configure NVIDIA container toolkit repository
  ansible.builtin.yum_repository:
    name: nvidia-container-toolkit
    description: NVIDIA Container Toolkit Repository
    file: nvidia-container-toolkit
    baseurl: "{{ container_manager_nvidia_container_repo_baseurl }}"
    enabled: true
    gpgcheck: true
    gpgkey: file:///etc/pki/rpm-gpg/nvidia-container-toolkit-key.pub

- name: Ensure CRB repository is enabled
  ansible.builtin.command:
    cmd: dnf config-manager --set-enabled crb
  changed_when: false

- name: Install NVIDIA prerequisite repositories
  ansible.builtin.dnf:
    name: "{{ container_manager_nvidia_repo_packages | default([]) }}"
    state: present
    update_cache: true
  when: (container_manager_nvidia_repo_packages | default([])) | length > 0

- name: Install NVIDIA driver prerequisites
  ansible.builtin.dnf:
    name: "{{ container_manager_nvidia_prerequisite_packages }}"
    state: present
    update_cache: true
  register: nvidia_prerequisites

- name: Remove floating NVIDIA driver metapackage
  ansible.builtin.dnf:
    name: cuda-drivers
    state: absent
  when: "'cuda-drivers' not in container_manager_nvidia_driver_packages"

- name: Install NVIDIA driver packages
  ansible.builtin.dnf:
    name: "{{ container_manager_nvidia_driver_packages }}"
    state: present
    update_cache: true
    allowerasing: true
  register: nvidia_driver_packages
  notify: restart docker

- name: Install NVIDIA container toolkit packages
  ansible.builtin.dnf:
    name: "{{ container_manager_nvidia_container_packages }}"
    state: present
  register: nvidia_container_toolkit_packages
  notify: restart docker

- name: Flush handlers to restart Docker after NVIDIA runtime changes
  ansible.builtin.meta: flush_handlers

- name: Try to load the NVIDIA kernel module without rebooting
  ansible.builtin.command:
    cmd: modprobe nvidia
  register: nvidia_modprobe
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Mark whether an NVIDIA reboot is required
  ansible.builtin.set_fact:
    container_manager_nvidia_reboot_required: >-
      {{
        nvidia_prerequisites.changed or
        nvidia_driver_packages.changed or
        nvidia_container_toolkit_packages.changed or
        (nvidia_modprobe is defined and nvidia_modprobe.rc != 0)
      }}

- name: Ensure nvidia-persistenced is enabled
  ansible.builtin.systemd:
    name: nvidia-persistenced
    enabled: true
    state: started
  failed_when: false